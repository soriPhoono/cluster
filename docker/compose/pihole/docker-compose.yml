services:
  pihole:
    image: pihole/pihole:2025.11.1
    container_name: pihole
    restart: on-failure
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 80:80
      - 443:443
    environment:
      TZ: "America/Chicago"
      FTLCONF_dns_upstreams: 9.9.9.9;149.112.112.112;1.1.1.1;1.0.0.1
    volumes:
      - pihole_config:/etc/pihole
volumes:
  pihole_config:

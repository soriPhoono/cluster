version: "3.8"

services:
  swarm-cd:
    image: ghcr.io/m-adawi/swarm-cd:latest
    secrets:
      - source: age
        target: /secrets/age.key
    configs:
      - source: stacks
        target: /app/stacks.yml
        mode: 256
      - source: repos
        target: /app/repos.yml
        mode: 256
      - source: config
        target: /app/config.yml
        mode: 256
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      SOPS_AGE_KEY_FILE: /secrets/age.key
      DOCKER_HOST: unix:///var/run/docker.sock

      DOMAIN_NAME: cryptic-coders.net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        max_attempts: 3

secrets:
  age:
    file: /home/sphoono/.config/sops/age/keys.txt

configs:
  stacks:
    file: ./stacks.yml
  repos:
    file: ./repos.yml
  config:
    file: ./config.yml

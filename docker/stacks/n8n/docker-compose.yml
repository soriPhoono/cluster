# =============================================================================
# n8n Automation Platform Stack
# =============================================================================
# Deployed via Portainer GitOps (Application Tier, not swarm-cd).
# Connects to shared PostgreSQL from the shared-services stack.
# Database provisioning handled by the n8n-db-migrate init container.
# See: docs/N8N Stack Deployment.md
# Reference: https://github.com/n8n-io/n8n-hosting/tree/main/docker-compose/withPostgresAndWorker
# =============================================================================

# ---------------------------------------------------------------------------
# Shared YAML anchors
# ---------------------------------------------------------------------------
x-n8n-shared: &n8n-shared
  image: n8nio/n8n:latest
  environment:
    # --- Database (shared PostgreSQL, provisioned by n8n-db-migrate) ---
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_DATABASE=n8n
    - DB_POSTGRESDB_USER=n8n
    - DB_POSTGRESDB_PASSWORD_FILE=/run/secrets/n8n_db_password
    # --- Queue mode ---
    - EXECUTIONS_MODE=queue
    - QUEUE_BULL_REDIS_HOST=redis
    - QUEUE_HEALTH_CHECK_ACTIVE=true
    # --- Encryption ---
    - N8N_ENCRYPTION_KEY_FILE=/run/secrets/n8n_encryption_key
    # --- Task runners ---
    - N8N_RUNNERS_MODE=external
    - N8N_RUNNERS_AUTH_TOKEN_FILE=/run/secrets/runners_auth_token
    - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
    - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
  volumes:
    - n8n_data:/home/node/.n8n
  networks:
    - internal
    - shared-services_postgres
  secrets:
    - n8n_encryption_key
    - runners_auth_token
    - n8n_db_password
  depends_on:
    - n8n-db-migrate
    - redis

x-runner: &runner
  image: n8nio/runners:latest
  networks:
    - internal

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:
  # -------------------------------------------------------------------------
  # Init: Database migration (provisions n8n user + database on shared PG)
  # Runs once, then exits. All n8n services depend on this completing.
  # -------------------------------------------------------------------------
  n8n-db-migrate:
    image: postgres:18-alpine
    entrypoint: ["bash", "/scripts/migrate-n8n-db.sh"]
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGPASSWORD_FILE=/run/secrets/postgres_root_password
      - N8N_DB_USER=n8n
      - N8N_DB_NAME=n8n
      - N8N_DB_PASSWORD_FILE=/run/secrets/n8n_db_password
    configs:
      - source: migrate_n8n_db
        target: /scripts/migrate-n8n-db.sh
        mode: 0555
    networks:
      - shared-services_postgres
    secrets:
      - postgres_root_password
      - n8n_db_password
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: none

  # -------------------------------------------------------------------------
  # Core: n8n main server
  # -------------------------------------------------------------------------
  n8n:
    <<: *n8n-shared
    networks:
      - internal
      - shared-services_postgres
      - reverse-proxy_public
    dns:
      - 100.100.100.100
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.http.routers.n8n.rule=Host(`automation.ts.cryptic-coders.net`)
        - traefik.http.routers.n8n.entrypoints=websecure
        - traefik.http.routers.n8n.tls.certresolver=dnsresolver
        - traefik.http.services.n8n.loadbalancer.server.port=5678

  # -------------------------------------------------------------------------
  # Satellite: Queue worker
  # -------------------------------------------------------------------------
  n8n-worker:
    <<: *n8n-shared
    command: worker
    depends_on:
      - n8n
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # -------------------------------------------------------------------------
  # Satellite: Task runner for n8n main (JS/Python code execution)
  # -------------------------------------------------------------------------
  n8n-runner:
    <<: *runner
    environment:
      - N8N_RUNNERS_AUTH_TOKEN_FILE=/run/secrets/runners_auth_token
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
    secrets:
      - runners_auth_token
    depends_on:
      - n8n
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # -------------------------------------------------------------------------
  # Satellite: Task runner for worker
  # -------------------------------------------------------------------------
  n8n-worker-runner:
    <<: *runner
    environment:
      - N8N_RUNNERS_AUTH_TOKEN_FILE=/run/secrets/runners_auth_token
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n-worker:5679
    secrets:
      - runners_auth_token
    depends_on:
      - n8n-worker
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # -------------------------------------------------------------------------
  # Satellite: Redis (Bull queue backend)
  # -------------------------------------------------------------------------
  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # -------------------------------------------------------------------------
  # Satellite: MongoDB for agent workflows
  # One instance shared by all agents that need document storage.
  # -------------------------------------------------------------------------
  n8n-agent-mongo:
    image: mongo:noble
    volumes:
      - agent_mongo_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # -------------------------------------------------------------------------
  # Satellite: PostgreSQL for agent workflows
  # One instance shared by all agents that need relational storage.
  # Separate from the shared-services postgres — this is agent-private data.
  # -------------------------------------------------------------------------
  n8n-agent-postgres:
    image: postgres:18
    environment:
      - POSTGRES_USER=n8n_agent
      - POSTGRES_PASSWORD_FILE=/run/secrets/n8n_agent_postgres_password
      - POSTGRES_DB=n8n_agents
    volumes:
      - agent_postgres_data:/var/lib/postgresql
    networks:
      - internal
    secrets:
      - n8n_agent_postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U n8n_agent -d n8n_agents"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  n8n_data:
  redis_data:
  agent_mongo_data:
  agent_postgres_data:

# ---------------------------------------------------------------------------
# Secrets (SOPS-encrypted)
# ---------------------------------------------------------------------------
secrets:
  n8n_encryption_key:
    file: ./secrets/n8n_encryption_key
  runners_auth_token:
    file: ./secrets/runners_auth_token
  n8n_db_password:
    file: ./secrets/n8n_db_password
  n8n_agent_postgres_password:
    file: ./secrets/n8n_agent_postgres_password
  # Shared-services root password — needed by the migration container
  postgres_root_password:
    file: ../shared-services/secrets/postgres_root_password

# ---------------------------------------------------------------------------
# Configs
# ---------------------------------------------------------------------------
configs:
  migrate_n8n_db:
    file: ./migrate-n8n-db.sh

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  internal:
    driver: overlay
  shared-services_postgres:
    external: true
  reverse-proxy_public:
    external: true

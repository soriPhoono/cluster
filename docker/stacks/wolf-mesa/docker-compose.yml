# Wolf Game Streaming Server (Mesa/AMD GPU)
# ===========================================
# Node prerequisites for the 'gaming-pc' labeled node:
#   1. AMD GPU drivers + Mesa installed on the host
#   2. /dev/dri/renderD129 and /dev/dri/card1 must be accessible
#   3. /dev/uinput and /dev/uhid must exist (for virtual input)
#   4. Docker daemon.json generic-resources configured:
#        "node-generic-resources": ["GPU=1"]
#   5. Label the node: docker node update --label-add type=gaming-pc <node-name>

services:
  wolf:
    image: ghcr.io/games-on-whales/wolf:v2024.07
    environment:
      WOLF_RENDER_NODE: /dev/dri/renderD129
    volumes:
      - /etc/wolf:/etc/wolf
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Only expose the specific GPU render node and virtual input devices.
      # 'devices' and 'device_cgroup_rules' are not supported by docker stack
      # deploy, so we bind-mount the device nodes directly.
      - /dev/dri/renderD129:/dev/dri/renderD129:rw
      - /dev/dri/card1:/dev/dri/card1:rw
      - /run/udev:/run/udev:rw
      - /dev/uinput:/dev/uinput:rw
      - /dev/uhid:/dev/uhid:rw
    ports:
      # Wolf uses host networking for Moonlight protocol (UDP streaming).
      # In Swarm mode, we publish ports in 'host' mode to bypass the
      # routing mesh and bind directly to the node's interfaces.
      - target: 47984
        published: 47984
        protocol: tcp
        mode: host
      - target: 47989
        published: 47989
        protocol: tcp
        mode: host
      - target: 47999
        published: 47999
        protocol: tcp
        mode: host
      - target: 47998
        published: 47998
        protocol: udp
        mode: host
      - target: 47999
        published: 47999
        protocol: udp
        mode: host
      - target: 48010
        published: 48010
        protocol: udp
        mode: host
      # RTSP stream
      - target: 48100
        published: 48100
        protocol: tcp
        mode: host
      # Control stream (range 48200-48299 may vary per session)
      - target: 48200
        published: 48200
        protocol: udp
        mode: host
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.type == gaming-pc
      resources:
        reservations:
          # Requires GPU generic resource advertised on the node
          # Configure in daemon.json: "node-generic-resources": ["GPU=1"]
          generic_resources:
            - discrete_resource_spec:
                kind: GPU
                value: 1
      restart_policy:
        condition: on-failure

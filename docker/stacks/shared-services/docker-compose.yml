services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_root_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - postgres
    secrets:
      - postgres_root_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        max_attempts: 3

volumes:
  postgres_data:

secrets:
  postgres_root_password:
    file: ./secrets/postgres_root_password

networks:
  postgres:
    driver: overlay
    attachable: true

services:
  postgres:
    image: postgres:18
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_root_password
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - postgres
    secrets:
      - postgres_root_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  adminer:
    image: adminer:latest
    networks:
      - postgres
      - reverse-proxy_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.adminer.rule=Host(`db.admin.${DOMAIN_NAME}`)
        - traefik.http.routers.adminer.entrypoints=websecure
        - traefik.http.routers.adminer.tls.certresolver=dnsresolver
        - traefik.http.services.adminer.loadbalancer.server.port=8080


  mongodb:
    image: mongo:8.0-noble
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongo
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongodb_root_password
    volumes:
      - mongodb_data:/data/db
    networks:
      - mongodb
    secrets:
      - mongodb_root_password
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
volumes:
  mongodb_data:
  postgres_data:

secrets:
  mongodb_root_password:
    file: ./secrets/mongodb_root_password
  postgres_root_password:
    file: ./secrets/postgres_root_password

networks:
  mongodb:
    driver: overlay
    attachable: true
  postgres:
    driver: overlay
    attachable: true
  reverse-proxy_public:
    external: true

services:
  traefik:
    image: traefik:v3.6.9 # Base version of v3 that supports docker API 1.44
    command:
      # Entrypoints
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --entryPoints.websecure.http.tls=true
      # Entrypoints Redirection (HTTP to HTTPS)
      - --entryPoints.web.http.redirections.entrypoint.to=websecure
      - --entryPoints.web.http.redirections.entrypoint.permanent=true
      # Docker Swarm Provider (using socket-proxy)
      - --providers.swarm.endpoint=tcp://socket-proxy:2375
      - --providers.swarm.watch=true
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.network=reverse-proxy_public
      # Certificate Resolvers
      # 1. HTTP Challenge (Public)
      - --certificatesresolvers.http.acme.httpchallenge=true
      - --certificatesresolvers.http.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.http.acme.email=soriphoono@gmail.com
      - --certificatesresolvers.http.acme.storage=/letsecrypt/acme.json
      # 2. DNS Challenge (Cloudflare - for local/private domains)
      - --certificatesresolvers.dnsresolver.acme.dnschallenge=true
      - --certificatesresolvers.dnsresolver.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.dnsresolver.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --certificatesresolvers.dnsresolver.acme.email=soriphoono@gmail.com
      - --certificatesresolvers.dnsresolver.acme.storage=/letsecrypt/acme.json
      # API/Dashboard
      - --api.dashboard=true
      - --api.insecure=false
      # Logging
      - --log.level=INFO
      - --accesslog=true
      - --metrics.prometheus=true
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    networks:
      - public
      - socket-internal
    secrets:
      - cf_api_token
    volumes:
      - traefik-certs:/letsecrypt
    environment:
      - CF_DNS_API_TOKEN_FILE=/run/secrets/cf_api_token
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.http.routers.traefik.rule=Host(`proxy.admin.${DOMAIN_NAME}`)
        - traefik.http.routers.traefik.entrypoints=websecure
        - traefik.http.routers.traefik.service=api@internal
        - traefik.http.routers.traefik.tls.certresolver=dnsresolver
        - traefik.http.services.traefik.loadbalancer.server.port=8080

  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      - SWARM=1 # Allow access to swarm info
      - SERVICES=1 # Allow access to services
      - TASKS=1 # Allow access to tasks
      - NETWORKS=1 # Allow access to networks
      - NODES=1 # Allow access to nodes
      - CONFIGS=1 # Allow access to configs
      - SECRETS=1 # Allow access to secrets
      - VOLUMES=0 # Deny access to volumes
      - POST=0 # Deny POST requests (Read-only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - socket-internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  traefik-certs:

secrets:
  cf_api_token:
    file: ./secrets/cf_api_token

networks:
  public:
    driver: overlay
    attachable: true
  socket-internal:
    driver: overlay
    internal: true

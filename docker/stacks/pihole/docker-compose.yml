version: '3.8'
services:
  pihole:
    image: pihole/pihole:latest
    ports:
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      - target: 53
        published: 53
        protocol: udp
        mode: host
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    environment:
      TZ: 'America/Chicago'
      FTLCONF_dns_upstreams: 9.9.9.9;149.112.112.112
    volumes:
      - pihole_config:/etc/pihole
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.type == dns-server
      restart_policy:
        condition: on-failure
volumes:
  pihole_config:

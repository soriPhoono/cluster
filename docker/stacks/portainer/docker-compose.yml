services:
  agent:
    image: portainer/agent:alpine
    # Note on Security Enhancements (docker-socket-proxy):
    # Unlike Traefik, the Portainer Agent requires direct access to the Docker socket.
    # We cannot use tecnativa/docker-socket-proxy here because:
    # 1. Swarm Networking: The agent runs in 'global' mode to query the *local* node daemon.
    #    Routing through a proxy on an overlay network causes Swarm's routing mesh to load-balance
    #    requests to random nodes, breaking cluster topology and execution commands.
    # 2. Security Benefit: Portainer requires nearly full root-level control of the Docker API
    #    (POST, BUILD, SECRETS, EXEC, etc.) to function. A proxy cannot restrict these endpoints
    #    without breaking Portainer, offering no meaningful defense if Portainer is compromised.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    environment:
      - DOCKER_API_VERSION=1.41
    networks:
      - agent_network
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux
      restart_policy:
        condition: on-failure
        max_attempts: 3
  portainer:
    image: portainer/portainer-ee:alpine
    command: -H tcp://tasks.agent:9001 --tlsskipverify
    volumes:
      - portainer_data:/data
    environment:
      - DOCKER_API_VERSION=1.41
    networks:
      - agent_network
      - reverse-proxy_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.http.routers.portainer.rule=Host(`admin.${DOMAIN_NAME}`)
        - traefik.http.routers.portainer.entrypoints=websecure
        - traefik.http.routers.portainer.tls.certresolver=dnsresolver
        - traefik.http.services.portainer.loadbalancer.server.port=9000
networks:
  agent_network:
    driver: overlay
    attachable: true
  reverse-proxy_public:
    external: true
volumes:
  portainer_data:

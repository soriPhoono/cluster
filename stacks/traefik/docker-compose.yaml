version: "3.7"
services:
  traefik:
    image: traefik:v3.1
    command:
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      # Entrypoints Redirection (HTTP to HTTPS)
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      # Docker Swarm Provider
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.watch=true"
      - "--providers.swarm.exposedByDefault=false"
      - "--providers.swarm.networks=reverse-proxy_traefik-public"
      # Certificate Resolvers
      # 1. HTTP Challenge (Public)
      - "--certificatesresolvers.http.acme.httpchallenge=true"
      - "--certificatesresolvers.http.acme.httpchallenge.entryPoint=web"
      - "--certificatesresolvers.http.acme.email=soriphoono@gmail.com"
      - "--certificatesresolvers.http.acme.storage=/letsecrypt/acme.json"
      # 2. DNS Challenge (Cloudflare - for local/private domains)
      - "--certificatesresolvers.dnsresolver.acme.dnschallenge=true"
      - "--certificatesresolvers.dnsresolver.acme.dnschallenge.entryPoint=web"
      - "--certificatesresolvers.dnsresolver.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.dnsresolver.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.dnsresolver.acme.email=soriphoono@gmail.com"
      - "--certificatesresolvers.dnsresolver.acme.storage=/letsecrypt/acme.json"
      # API/Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Logging
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
    networks:
      - traefik-public
    volumes:
      - traefik-certs:/letsecrypt
    environment:
      # DNS Challenge Credentials (for dnsresolver)
      - CLOUDFLARE_EMAIL=soriphoono@gmail.com
      - CF_DNS_API_TOKEN_FILE=/run/secrets/cf_api_token
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.traefik.rule=HostRegexp(`proxy.admin.ts.${DOMAIN_NAME}`)"
        - "traefik.http.routers.traefik.entrypoints=websecure"
        - "traefik.http.routers.traefik.service=api@internal"
        - "traefik.http.routers.traefik.tls.certresolver=dnsresolver"
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"
volumes:
  traefik-certs:
secrets:
  cf_api_token:
    file: ../secrets/cf_api_token
networks:
  traefik-public:
    driver: overlay
    attachable: true

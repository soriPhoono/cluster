version: "3.7"
services:
  swarm-cd:
    image: ghcr.io/m-adawi/swarm-cd:1.10.0
    secrets:
      - source: age
        target: /secrets/age.key
    configs:
      - source: stacks
        target: /app/stacks.yaml
        mode: 0400
      - source: repos
        target: /app/repos.yaml
        mode: 0400
      - source: config
        target: /app/config.yaml
        mode: 0400
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./stacks.yaml:/app/stacks.yaml
      - ./repos.yaml:/app/repos.yaml
      - ./config.yaml:/app/config.yaml
    environment:
      - SOPS_AGE_KEY_FILE=/secrets/age.key
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
secrets:
  age:
    file: /home/soriphoono/.config/sops/age/keys.txt
configs:
  stacks:
    file: ./stacks.yaml
  repos:
    file: ./repos.yaml
  config:
    file: ./config.yaml
